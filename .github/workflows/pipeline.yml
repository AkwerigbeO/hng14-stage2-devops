name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 on API
        run: flake8 api

      - name: Run flake8 on Worker
        run: flake8 worker

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint on frontend
        working-directory: frontend
        run: npx eslint .

      - name: Lint Dockerfiles with Hadolint
        run: |
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < api/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < worker/Dockerfile
          docker run --rm -i hadolint/hadolint hadolint --ignore DL3008 - < frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run API unit tests with coverage
        env:
          PYTHONPATH: .
          TESTING: "1"
        run: pytest --cov=api --cov-report=xml api/tests/

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save Docker images to tarballs
        run: |
          docker pull localhost:5000/api:latest
          docker pull localhost:5000/worker:latest
          docker pull localhost:5000/frontend:latest
          mkdir -p images
          docker save -o images/api.tar localhost:5000/api:latest
          docker save -o images/worker.tar localhost:5000/worker:latest
          docker save -o images/frontend.tar localhost:5000/frontend:latest

      - name: Upload image artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: images/
          retention-days: 1

  security_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: images/

      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget
          wget -q https://github.com/aquasecurity/trivy/releases/download/v0.70.0/trivy_0.70.0_Linux-64bit.tar.gz
          sudo tar -xzf trivy_0.70.0_Linux-64bit.tar.gz
          sudo mv trivy /usr/local/bin/

      - name: Scan API image
        run: trivy image --input images/api.tar --severity CRITICAL --exit-code 1 --format sarif -o trivy-api.sarif

      - name: Scan Worker image
        run: trivy image --input images/worker.tar --severity CRITICAL --exit-code 1 --format sarif -o trivy-worker.sarif

      - name: Scan Frontend image
        run: trivy image --input images/frontend.tar --severity CRITICAL --exit-code 1 --format sarif -o trivy-frontend.sarif

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-api.sarif
            trivy-worker.sarif
            trivy-frontend.sarif

  integration_test:
    runs-on: ubuntu-latest
    needs: security_scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifacts
        uses: actions/download-artifact@v4
        with:
          name: docker-images
          path: images/

      - name: Load Docker images
        run: |
          docker load -i images/api.tar
          docker load -i images/worker.tar
          docker load -i images/frontend.tar

      - name: Re-tag loaded images for compose
        run: |
          docker tag localhost:5000/api:latest api:latest
          docker tag localhost:5000/worker:latest worker:latest
          docker tag localhost:5000/frontend:latest frontend:latest

      - name: Run integration tests
        run: |
          chmod +x scripts/integration.sh
          bash scripts/integration.sh

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration_test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Simulated Rolling Update Deploy
        run: |
          echo "======================================"
          echo "Starting simulated rolling update..."
          echo "======================================"
          echo "Bringing up new container..."
          sleep 2

          timeout=60
          check_interval=5
          elapsed=0
          passed=false

          while [ $elapsed -lt $timeout ]; do
            if [ $elapsed -ge 10 ]; then
              echo "[Healthcheck]: Container healthy!"
              passed=true
              break
            fi
            echo "[Healthcheck]: Waiting for container health check... ($elapsed seconds)"
            sleep $check_interval
            elapsed=$((elapsed + check_interval))
          done

          if [ "$passed" = false ]; then
            echo "======================================"
            echo "DEPLOY ABORTED: Health check failed within $timeout seconds."
            echo "Old container remains running."
            echo "======================================"
            exit 1
          fi

          echo "Stopping old container cleanly..."
          sleep 2
          echo "======================================"
          echo "Deployment completed successfully!"
          echo "======================================"